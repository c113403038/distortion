<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>CSS 圖片樣式作業</title>
    <style>
        .container {
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 50px 20px;
        }

        /* 左邊：圓角、維持比例 (No Distortion) */
        .img-left {
            width: 33%;
            height: 300px;
            border-radius: 18px;
            object-fit: cover; /* 關鍵：像作業第一張圖，會裁切兩側但人不變形 */
        }

        /* 中間：圓形 (Border 150px) */
        .img-center {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 2px solid black;
            object-fit: cover;
        }

        /* 右邊：寬度 33%、高度 300px、強制填滿 (Distortion) */
        .img-right {
            width: 33%;
            height: 300px;
            object-fit: fill; /* 關鍵：強制拉伸，圖片內容會變扁或變瘦 */
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://images.unsplash.com/photo-1511739001486-6bfe10ce785f?w=600" class="img-left" alt="No Distortion">

        <img src="https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=400" class="img-center" alt="Circle">

        <img src="https://images.unsplash.com/photo-1511739001486-6bfe10ce785f?w=600" class="img-right" alt="Distortion">
    </div>

</body>
</html>
