<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f5f5f5;
        }

        .container {
            display: flex;
            justify-content: space-around;
            align-items: center;
            width: 90%;
            gap: 10px;
        }

        /* 共同樣式 */
        img {
            border: 1px solid #ccc; /* 加上淡淡的邊框以便觀察邊界 */
        }

        /* 左邊圖片：圓角 18px、高度 300px、寬度 33%、不失真 */
        .img-left {
            width: 33%;
            height: 300px;
            border-radius: 18px;
            object-fit: cover; /* 無失真關鍵，會裁切 */
        }

        /* 中間圖片：150x150 正圓形、有邊框、不失真 */
        .img-center {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 2px solid #333;
            object-fit: cover; /* 無失真關鍵 */
        }

        /* 右邊圖片：寬度 33%、高度 300px、會失真 */
        .img-right {
            width: 33%;
            height: 300px;
            object-fit: fill; /* 強制拉伸以造成失真 */
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://placehold.jp/16:9/c8a2c8/ffffff/600x338.png?text=Image+1+%28No+Distortion%29" class="img-left" alt="Image 1">

        <img src="https://placehold.jp/1:1/ffeb3b/333333/150x150.png?text=Center" class="img-center" alt="Center Image">

        <img src="https://placehold.jp/16:9/c8a2c8/ffffff/600x338.png?text=Image+3+%28Distorted%29" class="img-right" alt="Image 3 Distorted">
    </div>

</body>
</html>
