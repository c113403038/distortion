<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f9f9f9;
        }

        .container {
            display: flex;
            justify-content: space-around;
            align-items: center;
            width: 95%;
            gap: 15px;
        }

        /* 左邊：radius 18px / width 33% / no distortion */
        .img-left {
            width: 33%;
            height: 300px; /* 設定固定高度才能觀察是否失真 */
            border-radius: 18px;
            object-fit: cover; /* 關鍵：不失真，會自動裁切 */
        }

        /* 中間：圓形長寬都 150px / 有 border */
        .img-center {
            width: 150px;
            height: 150px;
            border-radius: 50%; /* 變成圓形 */
            border: 3px solid #333; /* 黑色邊框 */
            object-fit: cover;
        }

        /* 右邊：with distortion / width 33% / 高 300px */
        .img-right {
            width: 33%;
            height: 300px;
            object-fit: fill; /* 關鍵：強制填滿，會造成失真變形 */
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://picsum.photos/id/674/600/800" class="img-left" alt="No Distortion">

        <img src="https://picsum.photos/id/10/300/300" class="img-center" alt="Center Border">

        <img src="https://picsum.photos/id/674/600/800" class="img-right" alt="With Distortion">
    </div>

</body>
</html>
