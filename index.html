<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f5f5f5;
        }

        .container {
            display: flex;
            justify-content: space-around;
            align-items: center;
            width: 90%;
            gap: 10px;
        }

        /* 左邊圖片：寬度 33%、高度 300px、圓角 18px、不失真 */
        .img-left {
            width: 33%;
            height: 300px;
            border-radius: 18px;
            object-fit: cover; /* 無失真關鍵 */
        }

        /* 中間圖片：150x150 正圓形、有邊框、不失真 */
        .img-center {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 2px solid #333;
            object-fit: cover; /* 無失真關鍵 */
        }

        /* 右邊圖片：寬度 33%、高度 300px、會失真 */
        .img-right {
            width: 33%;
            height: 300px;
            object-fit: fill; /* 故意造成失真 */
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="[attachment_0](attachment)" class="img-left" alt="Eiffel Tower">

        <img src="[attachment_1](attachment)" class="img-center" alt="Landscape">

        <img src="[attachment_0](attachment)" class="img-right" alt="Eiffel Tower Distorted">
    </div>

</body>
</html>
